name: Build
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write

on:
  push:
    branches: [main]
  tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-2022
          - os: macos-14
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build electron app
        run: npm run electron:build -- --publish=never

      # 方案A核心：按系统打包成单一压缩包
      - name: Package release to single zip
        shell: bash
        run: |
          ZIP_NAME=release-${{ matrix.os }}.zip
          zip -r "$ZIP_NAME" release/
          echo "Created archive: $ZIP_NAME"

      # 仅上传压缩包，不再上传零散安装文件
      - name: Upload single zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagesprite-${{ matrix.os }}
          path: release-${{ matrix.os }}.zip
          retention-days: 7

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all zip artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      # 前置长等待，释放删除操作的API额度
      - name: Cool down before release operation
        run: sleep 15

      # 删除旧tag与旧Release，避免资产冲突
      - name: Purge old release & tag
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set +e
          gh release view "$TAG" >/dev/null 2>&1 && gh release delete "$TAG" --cleanup-tag -y
          git tag -d "$TAG" 2>/dev/null
          git push origin --delete "$TAG" 2>/dev/null
          set -e
          sleep 10

      # 创建空Release，生成更新日志
      - name: Create empty release draft
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            --title "Release $TAG"

      # 串行逐个上传3个zip，每个文件间隔3秒，限流自动重试
      - name: Upload zip assets one by one
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          MAX_RETRY=3
          DELAY_PER_FILE=3
          find ./dist -maxdepth 1 -name "release-*.zip" -type f | while read -r file; do
            echo "==== Start upload $file ===="
            attempt=1
            success=0
            while [ $attempt -le $MAX_RETRY ]; do
              if gh release upload "$TAG" "$file" --clobber; then
                success=1
                break
              fi
              echo "Hit rate limit, wait 30s to retry ($attempt/$MAX_RETRY)"
              sleep 30
              attempt=$((attempt + 1))
            done
            if [ $success -ne 1 ]; then
              echo "ERROR: Upload $file failed after multiple retries"
              exit 1
            fi
            echo "Upload $file success, sleep ${DELAY_PER_FILE}s..."
            sleep $DELAY_PER_FILE
          done