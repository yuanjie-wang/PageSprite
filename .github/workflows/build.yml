name: Build
# 并发锁，同tag只允许一条发布流程
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
# 全局权限
permissions:
  contents: write

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-2022
          - os: macos-14

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run electron:build -- --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pagesprite-${{ matrix.os }}
          path: release/
          retention-days: 7

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉全tag，才能删除远程tag

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      # 清空旧Release+tag，彻底避开delete-a-release-asset接口
      - name: Purge old release & tag
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set +e
          # 删除旧Release
          gh release view "$TAG" >/dev/null 2>&1 && gh release delete "$TAG" --cleanup-tag -y
          # 强制清理本地+远程tag缓存
          git tag -d "$TAG" 2>/dev/null
          git push origin --delete "$TAG" 2>/dev/null
          set -e
          # 等待API缓存同步，防止新建冲突
          sleep 8

      # 全新创建Release，无旧资产，不会报404
      - name: Create Brand New Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }} # 显式指定PAT
          tag_name: ${{ github.ref_name }}
          files: ./dist/**/*
          generate_release_notes: true
          overwrite_files: false # 关闭内置删除逻辑
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}