name: Build
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-2022
          - os: macos-14

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run electron:build -- --publish=never

      - name: Upload artifacts (build)
        uses: actions/upload-artifact@v4
        with:
          name: pagesprite-${{ matrix.os }}
          path: release/
          retention-days: 7

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create release if not yet created by another matrix job
          gh release create "${{ github.ref_name }}" --generate-notes || true
          shopt -s nullglob
          for f in release/*; do
            echo "Uploading $f to Release ${{ github.ref_name }}"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
