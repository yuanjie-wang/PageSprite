name: Build
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-2022
          - os: macos-14
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run electron:build -- --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pagesprite-${{ matrix.os }}
          path: release/
          retention-days: 7

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Pre wait to avoid secondary rate limit
        run: sleep 12

      - name: Purge old release & tag
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set +e
          gh release view "$TAG" >/dev/null 2>&1 && gh release delete "$TAG" --cleanup-tag -y
          git tag -d "$TAG" 2>/dev/null
          git push origin --delete "$TAG" 2>/dev/null
          set -e
          sleep 10

      - name: Create empty release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            --title "Release $TAG"

      - name: Upload assets one by one with throttle
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          MAX_RETRY=3
          DELAY_PER_FILE=2
          find ./dist -type f | while read -r file; do
            echo "Uploading: $file"
            attempt=1
            success=0
            while [ $attempt -le $MAX_RETRY ]; do
              if gh release upload "$TAG" "$file" --clobber; then
                success=1
                break
              fi
              echo "Rate limited or failed, retry $attempt after 30s..."
              sleep 30
              attempt=$((attempt + 1))
            done
            if [ $success -ne 1 ]; then
              echo "FATAL: upload $file failed after $MAX_RETRY retries"
              exit 1
            fi
            sleep $DELAY_PER_FILE
          done